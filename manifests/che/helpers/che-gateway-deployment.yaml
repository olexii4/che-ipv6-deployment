# Che gateway (Traefik + OAuth + kube-rbac-proxy) Deployment for manual provisioning.
# Used by provision-che-gateway-manually.sh when operator fails.
# Variables: NAMESPACE, TRAEFIK_IMAGE, CONFIGBUMP_IMAGE, OAUTH_PROXY_IMAGE, KUBE_RBAC_PROXY_IMAGE
#
# Generated by Cursor AI
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: che-gateway
  namespace: ${NAMESPACE}
  labels:
    app: che
    app.kubernetes.io/component: che-gateway
    app.kubernetes.io/instance: che
    app.kubernetes.io/name: che-gateway
    app.kubernetes.io/part-of: che.eclipse.org
    component: che-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: che
      component: che-gateway
  strategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: che
        app.kubernetes.io/component: che-gateway
        app.kubernetes.io/instance: che
        app.kubernetes.io/name: che-gateway
        app.kubernetes.io/part-of: che.eclipse.org
        component: che-gateway
    spec:
      terminationGracePeriodSeconds: 10
      serviceAccountName: che-gateway
      volumes:
      - name: static-config
        configMap:
          name: che-gateway-config
      - name: dynamic-config
        emptyDir: {}
      - name: header-rewrite-traefik-plugin
        configMap:
          name: che-gateway-config-header-rewrite-traefik-plugin
      - name: oauth-proxy-config
        configMap:
          name: che-gateway-config-oauth-proxy
      - name: kube-rbac-proxy-config
        configMap:
          name: che-gateway-config-kube-rbac-proxy
      containers:
      - name: gateway
        image: ${TRAEFIK_IMAGE}
        imagePullPolicy: Always
        volumeMounts:
        - name: static-config
          mountPath: /etc/traefik
        - name: dynamic-config
          mountPath: /dynamic-config
        - name: header-rewrite-traefik-plugin
          mountPath: /plugins-local/src/github.com/che-incubator/header-rewrite-traefik-plugin
        ports:
        - containerPort: 8081
          name: http
        - containerPort: 8090
          name: sink
        resources:
          limits:
            memory: 4Gi
            cpu: "1"
          requests:
            memory: 128Mi
            cpu: "0.1"
        readinessProbe:
          httpGet:
            path: /ping
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ping
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 5
      - name: configbump
        image: ${CONFIGBUMP_IMAGE}
        imagePullPolicy: Always
        env:
        - name: CONFIG_BUMP_DIR
          value: /dynamic-config
        - name: CONFIG_BUMP_LABELS
          value: app=che,component=che-gateway-config
        - name: CONFIG_BUMP_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: dynamic-config
          mountPath: /dynamic-config
        resources:
          limits:
            memory: 256Mi
            cpu: "0.5"
          requests:
            memory: 64Mi
            cpu: "0.05"
        readinessProbe:
          exec:
            command: ["configbump", "--version"]
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          exec:
            command: ["configbump", "--version"]
          initialDelaySeconds: 15
          periodSeconds: 5
      - name: oauth-proxy
        image: ${OAUTH_PROXY_IMAGE}
        imagePullPolicy: Always
        args:
        - --config=/etc/oauth-proxy/oauth-proxy.cfg
        volumeMounts:
        - name: oauth-proxy-config
          mountPath: /etc/oauth-proxy
        ports:
        - containerPort: 8080
          name: gateway-http
        resources:
          limits:
            memory: 512Mi
            cpu: "0.5"
          requests:
            memory: 64Mi
            cpu: "0.1"
        readinessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /oauth/healthz
            port: 8080
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 5
      - name: kube-rbac-proxy
        image: ${KUBE_RBAC_PROXY_IMAGE}
        imagePullPolicy: Always
        args:
        - --insecure-listen-address=0.0.0.0:8089
        - --upstream=http://127.0.0.1:8090/ping
        - --logtostderr=true
        - --config-file=/etc/kube-rbac-proxy/authorization-config.yaml
        - --v=0
        volumeMounts:
        - name: kube-rbac-proxy-config
          mountPath: /etc/kube-rbac-proxy
        resources:
          limits:
            memory: 512Mi
            cpu: "0.5"
          requests:
            memory: 64Mi
            cpu: "0.1"
        readinessProbe:
          httpGet:
            path: /ping
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /ping
            port: 8090
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 5
