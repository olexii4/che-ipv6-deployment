apiVersion: org.eclipse.che/v2
kind: CheCluster
metadata:
  name: eclipse-che
  namespace: ${NAMESPACE}
spec:
  components:
    devfileRegistry:
      # IPv6-only clusters: pods cannot reach registry.devfile.io (IPv4) or proxy.
      # Use internal registry (bundled in dashboard) + getting-started samples.
      disableInternalRegistry: false
      externalDevfileRegistries: []

    cheServer:
      debug: false
      logLevel: INFO
      # cheServer.proxy: enables factory resolver & devfile fetch on IPv6 (set by deploy script from cluster proxy / kubeconfig)
${CHE_SERVER_PROXY_LINE}
      deployment:
        containers:
          - name: che-server${CHE_SERVER_IMAGE_LINE}
            imagePullPolicy: Always

    dashboard:
      deployment:
        containers:
          - name: dashboard${DASHBOARD_IMAGE_LINE}
            imagePullPolicy: Always

  devEnvironments:
    startTimeoutSeconds: 600
    defaultEditor: che-incubator/che-code/latest
    defaultComponents:
      - name: universal-developer-image
        container:
          image: quay.io/devfile/universal-developer-image:ubi9-latest
          memoryLimit: 4Gi
          memoryRequest: 2Gi

  networking:
    auth:
      identityProviderURL: ""
