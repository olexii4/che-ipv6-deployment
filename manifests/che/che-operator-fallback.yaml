# Che Operator fallback when yq is not available.
# Variables: NAMESPACE, OPERATOR_IMAGE (set at runtime)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: che-operator
  namespace: ${NAMESPACE}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: che-operator
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: che-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: che-operator
subjects:
- kind: ServiceAccount
  name: che-operator
  namespace: ${NAMESPACE}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: che-operator
  namespace: ${NAMESPACE}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: che-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: che-operator
    spec:
      serviceAccountName: che-operator
      containers:
      - name: che-operator
        image: ${OPERATOR_IMAGE}
        imagePullPolicy: Always
        env:
        - name: WATCH_NAMESPACE
          value: "${NAMESPACE}"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: che-operator
