# Template for che-dashboard-airgap Secret. Used by generate-airgap-secret-manifest.sh.
# Variable: NAMESPACE. Script appends "data:" and base64-encoded file entries after this.
#
apiVersion: v1
kind: Secret
metadata:
  name: che-dashboard-airgap
  namespace: ${NAMESPACE}
  labels:
    app.kubernetes.io/part-of: che.eclipse.org
    app.kubernetes.io/component: che-dashboard-secret
  annotations:
    che.eclipse.org/mount-as: subpath
    che.eclipse.org/mount-path: /public/dashboard/devfile-registry/air-gap
type: Opaque
