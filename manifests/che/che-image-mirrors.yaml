# ImageTagMirrorSet - redirects quay.io/eclipse and quay.io/devfile to local registry.
# Apply when mirror script has pushed images but ICSP from mirror hasn't been applied yet.
# Requires: virthost.ostest.test.metalkube.org:5000 to have eclipse-che/eclipse and eclipse-che/devfile.
apiVersion: config.openshift.io/v1
kind: ImageTagMirrorSet
metadata:
  name: che-eclipse-mirror
spec:
  imageTagMirrors:
  - source: quay.io/eclipse
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che/eclipse
  - source: quay.io/devfile
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che/devfile
  - source: quay.io/che-incubator
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che/che-incubator
  - source: quay.io/openshift
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che/openshift
  # Test-infrastructure devfiles (Node.js, Python) - ubi8/nodejs-18, ubi8/python-39
  - source: registry.access.redhat.com
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che
  # Air-gap samples (php, nodejs-express, python) - devspaces/udi-rhel9:3.22
  - source: registry.redhat.io
    mirrors:
    - virthost.ostest.test.metalkube.org:5000/eclipse-che
