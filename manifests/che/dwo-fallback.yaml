# DevWorkspace Operator fallback when yq is not available.
# Variables: OPERATOR_IMAGE (set from CSV grep at runtime)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: devworkspace-controller-serviceaccount
  namespace: devworkspace-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devworkspace-controller-role
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devworkspace-controller-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devworkspace-controller-role
subjects:
- kind: ServiceAccount
  name: devworkspace-controller-serviceaccount
  namespace: devworkspace-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: devworkspace-controller-manager
  namespace: devworkspace-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: devworkspace-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devworkspace-controller
    spec:
      serviceAccountName: devworkspace-controller-serviceaccount
      containers:
      - name: devworkspace-controller
        image: ${OPERATOR_IMAGE}
        imagePullPolicy: Always
        env:
        - name: WATCH_NAMESPACE
          value: ""
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: OPERATOR_NAME
          value: devworkspace-controller
